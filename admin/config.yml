backend:
  name: github
  repo: twbaty/batiefamilyhistory
  branch: master
  auth_type: pkce
  app_id: Ov23liiK6cEnrxWWhP1G
  base_url: https://twbaty.github.io
  auth_endpoint: batiefamilyhistory/admin/

media_folder: "assets/images/uploads"
public_folder: "/batiefamilyhistory/assets/images/uploads"

collections:
  - name: "posts"
    label: "Posts"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Labels", name: "tags", widget: "list", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Published", name: "published", widget: "boolean", default: true }
