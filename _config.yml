title: Batie Family History
description: Researching the Batie/Baty family originating with Thomas Batie in Northumberland England about 1720.
baseurl: ""
url: "https://batie.netlify.app"

author:
  name: Batie Family
  about: "Genealogy researcher tracing the Batie/Baty family from Thomas Batie of Northumberland, England, circa 1720."

image: /assets/images/header-bg.jpg

links:
  - title: Ancestry.com
    url: https://www.ancestry.com
  - title: Find A Grave
    url: https://www.findagrave.com
  - title: Mark Every Grave
    url: https://markeverygrave.com
  - title: Newspapers.com
    url: https://www.newspapers.com
  - title: Pond Mills Cemetery
    url: https://pondmillscemetery.ca/
  - title: Telfer / English Settlement Presbyterian Cemetery
    url: https://www.findagrave.com/cemetery/2310095/telfer-cemetery
  - title: Fold3
    url: https://www.fold3.com

permalink: /:year/:month/:day/:title/

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-seo-tag

paginate: 5
paginate_path: "/page:num/"

timezone: America/Chicago

markdown: kramdown
kramdown:
  input: GFM

exclude:
  - Gemfile
  - Gemfile.lock
